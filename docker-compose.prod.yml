# ============================================================
# Aerial Survey Manager - Production Docker Compose
# 외부 기관 배포용
# ============================================================
#
# 사용법:
#   기본 (처리 엔진 제외): docker compose -f docker-compose.prod.yml up -d
#   처리 엔진 포함:        docker compose -f docker-compose.prod.yml --profile engine up -d
#
# 개발용과 차이점:
# - 소스 코드 마운트 제거 (이미지에 내장)
# - 보안 강화 (내부 포트 노출 제한)
# - 프로덕션용 nginx 설정 사용
# - restart: always 설정
#

version: '3.8'

# 공통 로그 설정
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-logging-worker: &worker-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "5"

services:
  # ============================================================
  # Frontend (React)
  # ============================================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - VITE_API_URL=
        - VITE_TUS_URL=/files/
        - VITE_MAP_OFFLINE=${VITE_MAP_OFFLINE:-true}
        # 확장자 없음 - nginx try_files가 자동으로 .jpg/.png 감지
        - VITE_TILE_URL=${VITE_TILE_URL:-/tiles/{z}/{x}/{y}}
    restart: always
    environment:
      - VITE_API_URL=
      - VITE_TUS_URL=/files/
      - VITE_MAP_OFFLINE=${VITE_MAP_OFFLINE:-true}
      # 확장자 없음 - nginx try_files가 자동으로 .jpg/.png 감지
      - VITE_TILE_URL=${VITE_TILE_URL:-/tiles/{z}/{x}/{y}}
    # 프로덕션: 소스 마운트 제거, 빌드된 이미지 사용
    depends_on:
      - api
    networks:
      - aerial-network
    logging: *default-logging

  # ============================================================
  # Backend API (FastAPI)
  # ============================================================
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: always
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/aerial_survey
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_BACKEND=${STORAGE_BACKEND:-local}
      - LOCAL_STORAGE_PATH=/data/storage
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BUCKET=aerial-survey
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-this-in-production}
      - EXTERNAL_ENGINE_URL=${EXTERNAL_ENGINE_URL:-}
      - EXTERNAL_ENGINE_API_KEY=${EXTERNAL_ENGINE_API_KEY:-}
      - MINIO_PUBLIC_ENDPOINT=${MINIO_PUBLIC_ENDPOINT:-localhost:8081}
    volumes:
      # 프로덕션: 소스 마운트 제거, 데이터 디렉토리만 마운트
      - ${PROCESSING_DATA_PATH:-./data/processing}:/data/processing
      - ${LOCAL_STORAGE_PATH:-./data/storage}:/data/storage
      - ${TILES_PATH:-/data/tiles}:/data/tiles:ro
      # 권역 GeoJSON 데이터 (초기 시드용)
      - ./data:/app/data:ro
      # 호스트 파일시스템 탐색용 (이미지 업로드 경로 선택)
      - /media:/media:ro,rslave
      - /mnt:/mnt:ro
      - /run/media:/run/media:ro
      - /home:/home:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - aerial-network
    logging: *default-logging

  # ============================================================
  # Celery Worker - GPU Processing Engine
  # 선택적 서비스: --profile engine 옵션으로 활성화
  # ============================================================
  worker-engine:
    container_name: aerial-worker-engine
    profiles:
      - engine
    build:
      context: .
      dockerfile: engines/metashape/Dockerfile.prod
    working_dir: /app
    command: celery -A app.workers.tasks worker -Q metashape --loglevel=info --concurrency=1 -n worker-engine@%h
    restart: always
    stop_signal: SIGTERM
    stop_grace_period: 120s
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.tasks inspect ping -d worker-engine@$$HOSTNAME --timeout 20 | grep -q pong || exit 1"]
      interval: 120s
      timeout: 30s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/aerial_survey
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_BACKEND=${STORAGE_BACKEND:-local}
      - LOCAL_STORAGE_PATH=/data/storage
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BUCKET=aerial-survey
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-this-in-production}
      - METASHAPE_LICENSE_KEY=${ENGINE_LICENSE_KEY:-}
      - PROJECT_ID=${PROJECT_ID:-unknown}
      - PLATFORM_WEBHOOK_URL=http://api:8000/api/v1/processing/webhook
      - BACKEND_URL_ORTHO=http://api:8000/api/v1/processing
    volumes:
      # 프로덕션: 데이터 디렉토리 마운트
      - ${PROCESSING_DATA_PATH:-./data/processing}:/data/processing
      - ${LOCAL_STORAGE_PATH:-./data/storage}:/data/storage
      - engine-license:/var/tmp/agisoft/licensing
      # 호스트 파일시스템 (이미지 원본 접근)
      - /media:/media:ro,rslave
      - /mnt:/mnt:ro
      - /run/media:/run/media:ro
      - /home:/home:ro
    depends_on:
      - redis
      - db
    networks:
      aerial-network:
        aliases:
          - worker-engine
    mac_address: "02:42:AC:17:00:64"
    logging: *worker-logging

  # ============================================================
  # Celery Beat (Scheduler)
  # ============================================================
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    command: celery -A app.workers.tasks beat --loglevel=info
    restart: always
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/aerial_survey
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_BACKEND=${STORAGE_BACKEND:-local}
      - MINIO_PUBLIC_ENDPOINT=${MINIO_PUBLIC_ENDPOINT:-localhost:8081}
    depends_on:
      - redis
    networks:
      - aerial-network
    logging: *default-logging

  # ============================================================
  # Celery Worker - 썸네일 전용 (처리 중에도 동시 실행)
  # ============================================================
  celery-worker-thumbnail:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    command: celery -A app.workers.tasks worker -Q thumbnail --loglevel=info --concurrency=1 -n worker-thumbnail@%h
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.tasks inspect ping -d worker-thumbnail@$$HOSTNAME --timeout 10 | grep -q pong || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/aerial_survey
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_BACKEND=${STORAGE_BACKEND:-local}
      - LOCAL_STORAGE_PATH=/data/storage
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-this-in-production}
    volumes:
      - ${LOCAL_STORAGE_PATH:-./data/storage}:/data/storage
      - ${PROCESSING_DATA_PATH:-./data/processing}:/data/processing
      - /media:/media:ro,rslave
      - /mnt:/mnt:ro
      - /run/media:/run/media:ro
      - /home:/home:ro
    depends_on:
      - redis
    networks:
      - aerial-network
    logging: *default-logging

  # ============================================================
  # Celery Worker (파일관리, COG삽입 등)
  # ============================================================
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    command: celery -A app.workers.tasks worker -Q celery --loglevel=info --concurrency=2 -n worker-celery@%h
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.tasks inspect ping -d worker-celery@$$HOSTNAME --timeout 10 | grep -q pong || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/aerial_survey
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_BACKEND=${STORAGE_BACKEND:-local}
      - LOCAL_STORAGE_PATH=/data/storage
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-this-in-production}
      - ENABLE_EXTERNAL_COG_INGEST=${ENABLE_EXTERNAL_COG_INGEST:-false}
    volumes:
      - ${LOCAL_STORAGE_PATH:-./data/storage}:/data/storage
      - ${PROCESSING_DATA_PATH:-./data/processing}:/data/processing
      - /media:/media:ro,rslave
      - /mnt:/mnt:ro
      - /run/media:/run/media:ro
      - /home:/home:ro
    depends_on:
      - redis
    networks:
      - aerial-network
    logging: *default-logging

  # ============================================================
  # PostgreSQL + PostGIS
  # ============================================================
  db:
    image: postgis/postgis:15-3.3
    restart: always
    environment:
      - POSTGRES_DB=aerial_survey
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    # 프로덕션: 외부 포트 노출 제거 (보안)
    # ports:
    #   - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - aerial-network
    logging: *default-logging

  # ============================================================
  # Redis
  # ============================================================
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    restart: always
    # 프로덕션: 외부 포트 노출 제거
    # ports:
    #   - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - aerial-network
    logging: *default-logging

  # ============================================================
  # MinIO (S3-compatible Storage)
  # ============================================================
  minio:
    image: minio/minio:latest
    profiles: ["minio"]
    command: server /data --console-address ":9001"
    restart: always
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_API_CORS_ALLOW_ORIGIN=*
    # 프로덕션: 외부 포트 노출 제거 (nginx를 통해 접근)
    # 관리자 콘솔만 로컬 접근 허용
    ports:
      - "127.0.0.1:9003:9001"  # Console - localhost만 접근 가능
    volumes:
      - ${MINIO_DATA_PATH:-./data/minio}:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - aerial-network
    logging: *default-logging

  # ============================================================
  # MinIO Bucket Init
  # ============================================================
  minio-init:
    image: minio/mc
    profiles: ["minio"]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mc alias set myminio http://minio:9000 $${MINIO_ACCESS_KEY:-minioadmin} $${MINIO_SECRET_KEY:-minioadmin}
        mc mb --ignore-existing myminio/aerial-survey
        mc anonymous set download myminio/aerial-survey/public
        mc anonymous set download myminio/aerial-survey/projects
        echo "MinIO bucket initialized successfully"
    environment:
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
    networks:
      - aerial-network

  # ============================================================
  # TiTiler (COG Tile Server)
  # ============================================================
  titiler:
    image: ghcr.io/developmentseed/titiler:0.18.0
    restart: always
    environment:
      - TITILER_API_CORS_ORIGINS=*
      - AWS_ACCESS_KEY_ID=${MINIO_ACCESS_KEY:-minioadmin}
      - AWS_SECRET_ACCESS_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - AWS_S3_ENDPOINT=minio:9000
      - AWS_VIRTUAL_HOSTING=FALSE
      - AWS_HTTPS=NO
      - AWS_NO_SIGN_REQUEST=NO
    volumes:
      - ${LOCAL_STORAGE_PATH:-./data/storage}:/data/storage:ro
    networks:
      - aerial-network
    logging: *default-logging

  # ============================================================
  # Nginx Reverse Proxy (Production)
  # ============================================================
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "${WEB_PORT:-8081}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      # 오프라인 타일맵 (선택사항 - TILES_PATH 환경변수로 설정)
      - ${TILES_PATH:-./data/tiles}:/data/tiles:ro
      # 로컬 스토리지
      - ${LOCAL_STORAGE_PATH:-./data/storage}:/data/storage:ro
    depends_on:
      - frontend
      - api
      - titiler
    networks:
      - aerial-network
    logging: *default-logging

  # ============================================================
  # Flower (Celery Monitoring) - 관리자 전용
  # ============================================================
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    command: celery -A app.workers.tasks flower --port=5555
    restart: always
    environment:
      - REDIS_URL=redis://redis:6379/0
    # 프로덕션: localhost만 접근 가능
    ports:
      - "127.0.0.1:5555:5555"
    depends_on:
      - redis
    networks:
      - aerial-network
    logging: *default-logging

networks:
  aerial-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.23.0.0/16

volumes:
  pgdata:
  redis_data:
  engine-license:
